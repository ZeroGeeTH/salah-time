deployment:
  name: local-vm-deploy
  environment: local
  host: 192.168.56.101
  port: 22
  user: deploy_user
  target_dir: /home/deploy_user/app
  service_name: myapp
  pre_deploy:
    - echo "Stopping service"
    - sudo systemctl stop myapp
  post_deploy:
    - echo "Starting service"
    - sudo systemctl start myapp
  artifact:
    path: ./build/myapp.tar.gz
    unpack: true
  env:
    APP_ENV: local
    DEBUG: "true"
