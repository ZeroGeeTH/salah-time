<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Webapp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <button id="theme-toggle" aria-label="Switch to dark mode">☀️</button>
    <div class="logo">MyApp</div>
  </header>
  <main>
    <div class="card">
      <h1>Welcome</h1>
      <div class="highlight-row">Highlight test row</div>
      <p>This is some content. Toggle dark mode using the button at the top left.</p>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
