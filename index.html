<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เวลาละหมาด</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="bg">
    <div id="card">
      <div class="header-row">
        <div class="logo-title">
          <svg id="logo-svg" viewBox="0 0 32 32" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M16 28c-5.523 0-10-4.477-10-10V10c0-2.21 1.79-4 4-4h12c2.21 0 4 1.79 4 4v8c0 5.523-4.477 10-10 10Zm-6-18c-1.104 0-2 .896-2 2v8c0 4.418 3.582 8 8 8s8-3.582 8-8V10c0-1.104-.896-2-2-2H10Zm5 8c.552 0 1-.448 1-1V13c0-.552-.448-1-1-1s-1 .448-1 1v4c0 .552.448 1 1 1Z" fill="#256019"/></g></svg>
          <span class="app-title">เวลาละหมาด</span>
        </div>
        <button id="settings-btn">ตั้งค่า</button>
      </div>
      <div id="dates-box">
        <div id="hijri-date" class="hijri-date"></div>
        <div id="city-date" class="city-date"></div>
      </div>
      <div id="prayer-list"></div>
      <div id="countdown-row">
        <span id="countdown-label"></span>
        <span id="countdown-timer"></span>
      </div>
    </div>
  </div>

  <div id="modal-backdrop" class="hide"></div>
  <div id="settings-modal" class="modal hide">
    <h2>เลือกเมือง</h2>
    <form id="city-form">
      <label for="city-input">ชื่อเมือง (ในภาษาอังกฤษ)</label>
      <input id="city-input" name="city" type="text" required autofocus>
      <button type="submit">ตกลง</button>
      <button type="button" id="cancel-settings">ยกเลิก</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
